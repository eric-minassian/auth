name: CI

# Runs on every PR, and is invoked by the deploy pipeline (deploy.yml) as the
# gate before anything is deployed. Pushes to main flow through that pipeline,
# so there is no standalone push trigger here (avoids a duplicate run).
on:
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check committed OpenAPI spec is up to date
        run: |
          cargo run --quiet --bin export-openapi > /tmp/openapi.json
          if ! diff -u openapi/openapi.json /tmp/openapi.json; then
            echo "::error::openapi/openapi.json is stale. Run 'pnpm generate' and commit."
            exit 1
          fi

  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check SDK wire types match the spec
        run: |
          pnpm --filter @eric-minassian/auth generate
          if ! git diff --exit-code packages/auth-sdk/src/generated; then
            echo "::error::SDK types are stale. Run 'pnpm --filter @eric-minassian/auth generate' and commit."
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm -r --if-present test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo build --bin local
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run E2E (boots DynamoDB Local + Rust API + Vite)
        run: pnpm --filter web exec playwright test
