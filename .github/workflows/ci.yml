name: CI

# Runs on every PR, and is invoked by the deploy pipeline (deploy.yml) as the
# gate before anything is deployed. Pushes to main flow through that pipeline,
# so there is no standalone push trigger here (avoids a duplicate run).
on:
  pull_request:
  workflow_call:

# Least privilege: CI only needs to read the checkout. Escalations (id-token,
# contents:write) live in the deploy/release workflows, never here.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Actions are pinned to full commit SHAs (a tag is mutable — see the
# tj-actions/changed-files CVE-2025-30066 retag); the trailing comment records
# the human-readable version Dependabot keeps current. dtolnay/rust-toolchain is
# a moving channel ref, so the pinned SHA is paired with an explicit
# `toolchain: stable` input (the SHA can't carry the channel name).
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # cargo-deny gates the lockfile on RustSec advisories, yanked crates,
      # wildcard reqs, and unknown sources (see deny.toml).
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories bans sources

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check committed OpenAPI spec is up to date
        run: |
          cargo run --quiet --bin export-openapi > /tmp/openapi.json
          if ! diff -u openapi/openapi.json /tmp/openapi.json; then
            echo "::error::openapi/openapi.json is stale. Run 'pnpm generate' and commit."
            exit 1
          fi

  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Enable pnpm via corepack: it reads the pinned version from package.json's
      # packageManager field and runs on the setup-node Node (pnpm 11.x needs Node
      # >=22.13). corepack uses pnpm's default store path; pnpm/action-setup nests
      # the store under node_modules, which breaks the @eric-minassian/design
      # github dep's declaration build with TS2883 ("type is not portable").
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Check SDK wire types match the spec
        run: |
          pnpm --filter @ericminassian/auth generate
          if ! git diff --exit-code packages/auth-sdk/src/generated; then
            echo "::error::SDK types are stale. Run 'pnpm --filter @ericminassian/auth generate' and commit."
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm -r --if-present test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # See the ts job for why pnpm is enabled via corepack rather than action-setup.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: cargo build --bin local
      - name: Install Playwright Chromium
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run E2E (boots DynamoDB Local + Rust API + Vite)
        run: pnpm --filter web exec playwright test
