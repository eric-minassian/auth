name: Deploy

# Push/merge to main -> run all checks (reuses ci.yml, incl. the local e2e
# suite) -> build the Rust Lambda + SPA -> deploy to prod. workflow_dispatch
# re-runs it manually. The CI deploy role (AuthCiRole) is NOT deployed here — it
# must pre-exist, since this job assumes it. See docs/deploy.md.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
    steps:
      # Actions pinned to commit SHAs (mutable tags are a supply-chain risk —
      # CVE-2025-30066); the trailing comment is the version Dependabot tracks.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-lambda
        run: pip install cargo-lambda

      # Enable pnpm via corepack: it reads the pinned version from package.json's
      # packageManager field and runs on the setup-node Node (pnpm 11.x needs Node
      # >=22.13). corepack uses pnpm's default store path; pnpm/action-setup nests
      # the store under node_modules, breaking the design dep's d.ts build (TS2883).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Build Rust Lambda (ARM64)
        run: cargo lambda build --release --arm64 --bin auth-service
      - name: Build SPA
        run: pnpm --filter web build

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy (prod)
        working-directory: infra
        env:
          # CDK reads these to locate the built artifacts (see config/environments.ts).
          LAMBDA_DIST: ../target/lambda/auth-service
          SPA_DIST: ../apps/web/dist
        # The alert email is read from SSM at deploy time (never committed —
        # public repo) and handed to CDK as context; absent parameter = no
        # subscription change. One-time setup: docs/deploy.md.
        run: |
          EXTRA_CONTEXT=()
          ALERT_EMAIL=$(aws ssm get-parameter --name /auth/alert-email \
            --query Parameter.Value --output text 2>/dev/null || true)
          if [ -n "$ALERT_EMAIL" ] && [ "$ALERT_EMAIL" != "None" ]; then
            EXTRA_CONTEXT+=(--context "alertEmail=$ALERT_EMAIL")
          fi
          pnpm exec cdk deploy --context env=prod "${EXTRA_CONTEXT[@]}" \
            AuthStateful AuthApp --require-approval never

      - name: Seed OIDC clients
        working-directory: infra
        # configure-aws-credentials exports AWS_REGION for seed.ts.
        run: pnpm exec tsx scripts/seed.ts

      - name: Post-deploy smoke test
        # From-the-internet verification through CloudFront: discovery serves
        # the right issuer, JWKS has keys, the SPA shell loads. Fails the
        # deploy run loudly instead of leaving a broken prod quietly.
        run: |
          set -euo pipefail
          ISSUER="https://auth.ericminassian.com"
          disc=$(curl -fsS --max-time 15 "$ISSUER/.well-known/openid-configuration")
          echo "$disc" | jq -e --arg iss "$ISSUER" '.issuer == $iss' > /dev/null \
            || { echo "::error::discovery issuer mismatch"; exit 1; }
          curl -fsS --max-time 15 "$ISSUER/.well-known/jwks.json" \
            | jq -e '.keys | length >= 1' > /dev/null \
            || { echo "::error::JWKS has no keys"; exit 1; }
          curl -fsS --max-time 15 -o /dev/null "$ISSUER/"
