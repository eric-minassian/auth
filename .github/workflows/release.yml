name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only; the release job escalates exactly what changesets needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets creates the version PR / tags / GitHub Release
      pull-requests: write # …and opens the "Version Packages" PR
      # Required for npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN.
      id-token: write
    steps:
      # Actions pinned to commit SHAs (mutable tags are a supply-chain risk —
      # CVE-2025-30066); the trailing comment is the version Dependabot tracks.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Enable pnpm via corepack: reads the pinned version from package.json's
      # packageManager field and runs on the setup-node Node (pnpm 11.x needs Node
      # >=22.13). corepack uses pnpm's default store path; pnpm/action-setup nests
      # the store under node_modules, breaking the design dep's d.ts build (TS2883).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ericminassian/auth build
      - name: Create Release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          # changeset publish runs `pnpm publish` (changesets detects the package
          # manager), which authenticates to npm via OIDC trusted publishing on
          # pnpm >=11.1.3 — no token, with provenance. It's idempotent (skips
          # already-published versions) and lets the action create GitHub Releases.
          # The id-token: write permission below enables the OIDC token exchange.
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
