# Keeps the dependency trees that build the SDK (imported by every RP) and the
# auth service current. Minor/patch bumps are grouped into one PR per ecosystem
# to cut noise; majors come through individually. Pinned GitHub Actions SHAs are
# bumped here too, so pinning (see the workflows) doesn't mean going stale.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types: [minor, patch]
